name: release

on:
  push:
    tags:
      - "[0-9][0-9]*.[0-9][0-9]*.[0-9][0-9]*"
      - "[0-9][0-9]*.[0-9][0-9]*.[0-9][0-9]*a[0-9]*"
      - "[0-9][0-9]*.[0-9][0-9]*.[0-9][0-9]*b[0-9]*"
      - "[0-9][0-9]*.[0-9][0-9]*.[0-9][0-9]*rc[0-9]*"

env:
  PACKAGE_NAME: "poseigen_trident"

jobs:
  details:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.release.outputs.new_version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract release details from tag
        id: release
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            echo "new_version=$TAG_NAME" >> "$GITHUB_OUTPUT"
            echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
            echo "Tag name: $TAG_NAME"
          else
            echo "No tag found"
            exit 1
          fi

  check_pypi:
    needs: details
    runs-on: ubuntu-latest
    steps:
      - name: Verify version does not already exist on PyPI
        env:
          NEW_VERSION: ${{ needs.details.outputs.new_version }}
        run: |
          response=$(curl -s "https://pypi.org/pypi/${{ env.PACKAGE_NAME }}/json" || echo "{}")
          if echo "$response" | jq -e ".releases[\"$NEW_VERSION\"]" >/dev/null; then
            echo "Version $NEW_VERSION already exists on PyPI."
            exit 1
          fi
          echo "Version $NEW_VERSION is available for publishing."

  build:
    needs: [details, check_pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Set project version from tag
        env:
          NEW_VERSION: ${{ needs.details.outputs.new_version }}
        run: |
          sed -i -E "s/^version = \"[^\"]+\"/version = \"$NEW_VERSION\"/" pyproject.toml

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi_publish:
    name: Upload release to PyPI
    needs: [build, details]
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github_release:
    name: Create GitHub Release
    needs: [build, details]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.details.outputs.tag_name }}" dist/* \
            --title "${{ needs.details.outputs.tag_name }}" \
            --generate-notes
